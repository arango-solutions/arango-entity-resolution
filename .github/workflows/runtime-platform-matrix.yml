name: Runtime Platform Matrix

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/runtime-platform-matrix.yml"
      - "src/entity_resolution/cli.py"
      - "src/entity_resolution/services/runtime_*.py"
      - "tests/test_cli.py"
      - "tests/test_runtime_*.py"
      - "docs/development/RUNTIME_HEALTH_CI_RUNBOOK.md"
      - "ci/runtime-quality/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/runtime-platform-matrix.yml"
      - "src/entity_resolution/cli.py"
      - "src/entity_resolution/services/runtime_*.py"
      - "tests/test_cli.py"
      - "tests/test_runtime_*.py"
      - "docs/development/RUNTIME_HEALTH_CI_RUNBOOK.md"
      - "ci/runtime-quality/**"
  workflow_dispatch:
    inputs:
      enable_self_hosted:
        description: "Enable Apple Silicon and Linux GPU self-hosted jobs"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: runtime-platform-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-platform-tests:
    name: ${{ matrix.name }}
    runs-on: ${{ fromJson(matrix.runs_on) }}
    timeout-minutes: 30
    if: ${{ !matrix.self_hosted || (github.event_name == 'workflow_dispatch' && github.event.inputs.enable_self_hosted == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-cpu
            runs_on: '["ubuntu-latest"]'
            self_hosted: false
            platform_tag: linux-cpu
            run_quality_gate: true
          - name: apple-silicon
            runs_on: '["self-hosted","macOS","ARM64"]'
            self_hosted: true
            platform_tag: apple-silicon
            run_quality_gate: false
          - name: linux-gpu
            runs_on: '["self-hosted","linux","x64","gpu","nvidia"]'
            self_hosted: true
            platform_tag: linux-gpu
            run_quality_gate: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,ml,mcp]"

      - name: Runtime CLI contract smoke checks
        run: |
          arango-er runtime-health-benchmark --help
          arango-er runtime-health-gate --help

      - name: Runtime benchmark/gate unit checks
        env:
          USE_DEFAULT_PASSWORD: "true"
        run: |
          pytest -q tests/test_runtime_benchmark_service.py
          pytest -q tests/test_cli.py -k "runtime_health_benchmark or runtime_health_gate"
          pytest -q tests/test_runtime_quality_policy_service.py tests/test_runtime_quality_policy_ci.py

      - name: Validate quality policy and artifact references
        run: |
          python - <<'PY'
          from entity_resolution.services.runtime_quality_policy_service import (
              RuntimeQualityPolicyService,
          )

          RuntimeQualityPolicyService.validate_policy_file(
              "ci/runtime-quality/quality_gate_policy.json"
          )
          PY

      - name: Start ephemeral ArangoDB for quality gate
        if: ${{ matrix.run_quality_gate }}
        run: |
          ARANGO_ROOT_PASSWORD="${ARANGO_ROOT_PASSWORD:-${ARANGO_PASSWORD:-$(python - <<'PY'
          import secrets
          print(secrets.token_urlsafe(24))
          PY
          )}}"
          echo "ARANGO_ROOT_PASSWORD=$ARANGO_ROOT_PASSWORD" >> "$GITHUB_ENV"
          echo "ARANGO_PASSWORD=$ARANGO_ROOT_PASSWORD" >> "$GITHUB_ENV"
          docker run -d --name runtime-gate-arango -e ARANGO_ROOT_PASSWORD="$ARANGO_ROOT_PASSWORD" -p 8529:8529 arangodb:3.11
          for i in {1..30}; do
            if curl -fsS -u "root:${ARANGO_ROOT_PASSWORD}" "http://127.0.0.1:8529/_api/version" >/dev/null; then
              echo "ArangoDB is ready"
              exit 0
            fi
            sleep 2
          done
          echo "ArangoDB did not become ready in time" >&2
          exit 1

      - name: Resolve quality gate policy for lane
        if: ${{ matrix.run_quality_gate }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(Path("ci/runtime-quality/quality_gate_policy.json").read_text(encoding="utf-8"))
          profile = "${{ matrix.platform_tag }}"
          cfg = policy["profiles"][profile]

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as fh:
              fh.write(f"QUALITY_LABEL={cfg['label']}\n")
              fh.write(f"QUALITY_CORPUS={cfg['quality_corpus']}\n")
              fh.write(f"QUALITY_BASELINE={cfg['quality_baseline_metrics']}\n")
              fh.write(f"QUALITY_MODEL_NAME={cfg['quality_model_name']}\n")
              fh.write(f"QUALITY_DEVICE={cfg['quality_device']}\n")
              fh.write(f"QUALITY_BATCH_SIZE={cfg['quality_batch_size']}\n")
              fh.write(f"QUALITY_COSINE_DRIFT_MAX={cfg['quality_cosine_drift_max']}\n")
              fh.write(f"QUALITY_TOPK_OVERLAP_MIN={cfg['quality_topk_overlap_min']}\n")
          PY

      - name: Run corpus-driven runtime health gate
        if: ${{ matrix.run_quality_gate }}
        run: |
          mkdir -p artifacts/runtime artifacts/quality
          arango-er runtime-health-gate \
            -c config/er_config.example.yaml \
            --host 127.0.0.1 \
            --port 8529 \
            --username root \
            --password "${ARANGO_ROOT_PASSWORD}" \
            --database _system \
            --registry-file artifacts/runtime/runtime_registry_${{ matrix.platform_tag }}.json \
            --label "${QUALITY_LABEL}" \
            --bootstrap-baseline \
            --quality-corpus "${QUALITY_CORPUS}" \
            --quality-model-name "${QUALITY_MODEL_NAME}" \
            --quality-device "${QUALITY_DEVICE}" \
            --quality-batch-size "${QUALITY_BATCH_SIZE}" \
            --quality-baseline-metrics "${QUALITY_BASELINE}" \
            --quality-cosine-drift-max "${QUALITY_COSINE_DRIFT_MAX}" \
            --quality-topk-overlap-min "${QUALITY_TOPK_OVERLAP_MIN}" \
            --fail-on-regression > artifacts/quality/quality_gate_${{ matrix.platform_tag }}.json

      - name: Stop ephemeral ArangoDB
        if: ${{ always() && matrix.run_quality_gate }}
        run: |
          docker rm -f runtime-gate-arango || true

      - name: Collect runtime environment evidence
        if: always()
        run: |
          mkdir -p artifacts/runtime
          python - <<'PY'
          import json
          import platform
          from pathlib import Path

          payload = {
              "platform_tag": "${{ matrix.platform_tag }}",
              "python_version": platform.python_version(),
              "system": platform.system(),
              "machine": platform.machine(),
              "processor": platform.processor(),
          }

          try:
              import torch
              payload["torch"] = {
                  "available": True,
                  "version": getattr(torch, "__version__", None),
                  "cuda_available": bool(torch.cuda.is_available()),
                  "mps_available": bool(
                      hasattr(torch.backends, "mps")
                      and torch.backends.mps.is_available()
                  ),
              }
          except Exception as exc:
              payload["torch"] = {"available": False, "error": str(exc)}

          try:
              import onnxruntime as ort
              payload["onnxruntime"] = {
                  "available": True,
                  "version": ort.__version__,
                  "providers": ort.get_available_providers(),
              }
          except Exception as exc:
              payload["onnxruntime"] = {"available": False, "error": str(exc)}

          out = Path("artifacts/runtime") / f"runtime_env_${{ matrix.platform_tag }}.json"
          out.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print(f"Wrote {out}")
          PY

      - name: Upload runtime matrix logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-matrix-${{ matrix.platform_tag }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            .pytest_cache
            artifacts/runtime/runtime_env_${{ matrix.platform_tag }}.json
            artifacts/runtime/runtime_registry_${{ matrix.platform_tag }}.json
            artifacts/quality/quality_gate_${{ matrix.platform_tag }}.json
